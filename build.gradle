plugins {
	id 'java'
	id 'war'
	id 'org.springframework.boot' version '4.0.5'
	id 'io.spring.dependency-management' version '1.1.7'
}

group = 'com.green'
version = '0.0.1-SNAPSHOT'

java {
	toolchain {
		languageVersion = JavaLanguageVersion.of(25)
	}
}

repositories {
	mavenCentral()
}

dependencies {
	implementation 'org.springframework.boot:spring-boot-starter-webmvc'
	providedRuntime 'org.springframework.boot:spring-boot-starter-tomcat-runtime'
	testImplementation 'org.springframework.boot:spring-boot-starter-webmvc-test'
	testRuntimeOnly 'org.junit.platform:junit-platform-launcher'

	// jsp 설정 추가
	implementation 'org.apache.tomcat.embed:tomcat-embed-jasper'            // tomcat jsper
	implementation 'jakarta.servlet:jakarta.servlet-api'                    // jsp servlet-api
	implementation 'jakarta.servlet.jsp.jstl:jakarta.servlet.jsp.jstl-api'  // jstl
	runtimeOnly 'org.glassfish.web:jakarta.servlet.jsp.jstl'                // jstl 

}

tasks.named('test') {
	useJUnitPlatform()
}
